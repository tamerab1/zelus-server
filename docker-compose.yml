# Zelus Web Infrastructure — docker-compose.yml
# ─────────────────────────────────────────────
# Start web stack:   docker compose --profile web up -d
# Start game server: docker compose --profile game up -d
# First-time SSL:    ./nginx/init-certbot.sh

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zelus_postgres
    restart: unless-stopped
    profiles: [web]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-zelus_db}
      POSTGRES_USER:     ${POSTGRES_USER:-zelus_web}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zelus_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zelus_web} -d ${POSTGRES_DB:-zelus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./zelus-website-api
      dockerfile: Dockerfile
    image: zelus/api:latest
    container_name: zelus_api
    restart: unless-stopped
    profiles: [web]
    env_file: ./zelus-website-api/.env
    environment:
      # Override DB URL to use the compose service hostname
      DATABASE_URL: postgresql://${POSTGRES_USER:-zelus_web}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zelus_db}
      GAME_DB_HOST: ${GAME_DB_HOST:-localhost}
      CHARACTERS_DIR: /server/data/characters
    volumes:
      - game_characters:/server/data/characters:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zelus_internal
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── React Frontend ────────────────────────────────────────────────────────
  website:
    build:
      context: ./zelus-website-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL:            ${VITE_API_URL:-https://api.zelusrsps.com}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    image: zelus/website:latest
    container_name: zelus_website
    restart: unless-stopped
    profiles: [web]
    networks:
      - zelus_internal
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: zelus_nginx
    restart: unless-stopped
    profiles: [web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - ./patch-server:/server/patch:ro
    depends_on:
      - api
      - website
    networks:
      - zelus_internal
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Certbot (auto-renewal daemon) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: zelus_certbot
    profiles: [web]
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renews every 12 hours; certbot only acts when < 30 days remain
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

  # ── Game Server (optional co-location) ───────────────────────────────────
  # In production, run this on a separate VPS/dedicated server to isolate
  # game traffic from web traffic and protect against DDoS.
  game_server:
    build:
      context: ./DMMPVP
      dockerfile: Dockerfile
    image: zelus/game-server:latest
    container_name: zelus_game
    restart: unless-stopped
    profiles: [game]
    ports:
      - "43594:43594"
    volumes:
      - game_characters:/server/data/characters
    environment:
      JAVA_OPTS: >-
        -server -Xmx4G -Xms2G
        -XX:+UseG1GC -XX:MaxGCPauseMillis=50
        -XX:+ParallelRefProcEnabled -XX:+AlwaysPreTouch
        -Dfile.encoding=UTF-8
    networks:
      - zelus_game_net
    deploy:
      resources:
        limits:
          memory: 5G

volumes:
  postgres_data:
    driver: local
  certbot_webroot:
    driver: local
  certbot_certs:
    driver: local
  game_characters:
    external: true

networks:
  zelus_internal:
    driver: bridge
    internal: false   # nginx needs outbound access for certbot
  zelus_game_net:
    driver: bridge
