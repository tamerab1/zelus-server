# docker-compose.override.yml
# Auto-applied locally. Do NOT copy to production server.
# Production: docker compose -f docker-compose.yml --profile web up -d

services:

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount the entire conf.d directory (avoids Windows file-mount limitation)
      - ./nginx/local:/etc/nginx/conf.d:ro

  certbot:
    entrypoint: ["sh", "-c", "echo 'Certbot skipped in local dev' && sleep infinity"]
