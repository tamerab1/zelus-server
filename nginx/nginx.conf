# /etc/nginx/nginx.conf
# Mounted read-only into the zelus_nginx container.

user  nginx;
worker_processes  auto;          # one worker per CPU core
worker_rlimit_nofile 65535;      # raise open-file limit for high concurrency

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;      # hide Nginx version from error pages / headers
    types_hash_max_size 2048;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml font/woff2;

    # ── Buffers (tune for API response sizes) ─────────────────────────────────
    client_max_body_size     10m;
    client_body_buffer_size  128k;
    proxy_buffer_size        16k;
    proxy_buffers            8 16k;
    proxy_busy_buffers_size  32k;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # addr:     general per-IP connection limit
    # api:      general API requests
    # register: tight limit on registration / login (anti-bot)
    limit_conn_zone $binary_remote_addr zone=addr:20m;
    limit_req_zone  $binary_remote_addr zone=api:20m      rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=register:10m rate=5r/m;
    limit_req_status 429;

    # ── Upstream pools ────────────────────────────────────────────────────────
    upstream zelus_api {
        server api:8000;
        keepalive 32;
    }

    upstream zelus_web {
        server website:80;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
