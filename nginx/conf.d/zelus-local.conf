# Local development config — HTTP only, no SSL required.
# Used via docker-compose.override.yml when running on localhost.
# On production, this file is NOT mounted; zelus.conf (with SSL) is used instead.

server {
    listen 80;
    server_name localhost;

    # Website (React SPA)
    location / {
        proxy_pass         http://zelus_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API — accessible at /api/ locally
    location /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://zelus_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
