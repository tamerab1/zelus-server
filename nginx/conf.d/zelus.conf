# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name zelusrsps.com www.zelusrsps.com api.zelusrsps.com;

    # Certbot webroot challenge (used by init-certbot.sh and auto-renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Website: zelusrsps.com / www.zelusrsps.com ───────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name zelusrsps.com www.zelusrsps.com;

    ssl_certificate     /etc/letsencrypt/live/zelusrsps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zelusrsps.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"      always;
    # CSP: allow Cloudflare Turnstile frames + scripts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com; connect-src 'self' https://api.zelusrsps.com" always;

    # Limit simultaneous connections per IP
    limit_conn addr 100;

    # Proxy to React/Nginx container
    location / {
        proxy_pass         http://zelus_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ── API: api.zelusrsps.com ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name api.zelusrsps.com;

    ssl_certificate     /etc/letsencrypt/live/zelusrsps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zelusrsps.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;

    limit_conn addr 200;

    # Tight rate limit on auth endpoints
    location ~* ^/(register|login|verify-email) {
        limit_req zone=register burst=10 nodelay;
        proxy_pass         http://zelus_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # General API — moderate rate limit
    location / {
        limit_req zone=api burst=60 nodelay;
        proxy_pass         http://zelus_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
