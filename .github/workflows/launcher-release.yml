# ── Zelus Launcher — GitHub Actions Release Pipeline ─────────────────────────
# Triggers on any tag like v1.0.0
# Builds native packages on Windows, macOS, and Linux runners in parallel.
# Uploads all artifacts to the GitHub Release.
#
# To release: git tag v1.0.1 && git push origin v1.0.1

name: Launcher Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Package Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Build fat JAR
        working-directory: launcher
        shell: bash
        run: |
          set +e
          ./gradlew shadowJar --stacktrace 2>&1
          GRADLE_EXIT=$?
          set -e
          echo "--- Gradle exit: $GRADLE_EXIT ---"
          echo "--- build/libs contents ---"
          ls -la build/libs/ 2>&1 || echo "(directory does not exist)"
          exit $GRADLE_EXIT

      - name: Build app-image (portable, no WiX required)
        working-directory: launcher
        shell: bash
        run: |
          JAR_NAME=$(ls build/libs/zelus-launcher-*.jar | head -1 | xargs basename)
          ICON_FLAG=""
          [ -f src/main/resources/zelus.ico ] && ICON_FLAG="--icon src/main/resources/zelus.ico"
          jpackage \
            --type app-image \
            --name ZelusLauncher \
            --app-version "$VERSION" \
            --vendor Zelus \
            --description "Zelus RSPS Launcher" \
            --input build/libs \
            --main-jar "$JAR_NAME" \
            --main-class com.zelus.launcher.ZelusLauncher \
            --dest build/dist \
            --java-options "-Xmx256m" \
            --java-options "-Dfile.encoding=UTF-8" \
            $ICON_FLAG

      - name: Zip app-image
        shell: bash
        run: |
          cd launcher/build/dist
          7z a "ZelusLauncher-${VERSION}-windows.zip" ZelusLauncher/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: launcher/build/dist/ZelusLauncher-*-windows.zip

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: Package macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Build fat JAR
        working-directory: launcher
        run: ./gradlew shadowJar

      - name: Package .dmg
        working-directory: launcher
        run: |
          JAR_NAME=$(ls build/libs/zelus-launcher-*.jar | head -1 | xargs basename)
          ICON_FLAG=""
          [ -f src/main/resources/zelus.icns ] && ICON_FLAG="--icon src/main/resources/zelus.icns"
          jpackage \
            --type dmg \
            --name ZelusLauncher \
            --app-version "$VERSION" \
            --vendor Zelus \
            --description "Zelus RSPS Launcher" \
            --input build/libs \
            --main-jar "$JAR_NAME" \
            --main-class com.zelus.launcher.ZelusLauncher \
            --dest build/dist \
            --java-options "-Xmx256m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --mac-package-name ZelusLauncher \
            $ICON_FLAG

      - name: Rename DMG
        run: mv launcher/build/dist/ZelusLauncher-*.dmg launcher/build/dist/ZelusLauncher-${VERSION}-mac.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: launcher/build/dist/ZelusLauncher-*-mac.dmg

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Package Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Build fat JAR
        working-directory: launcher
        run: ./gradlew shadowJar

      - name: Package .deb
        working-directory: launcher
        run: |
          JAR_NAME=$(ls build/libs/zelus-launcher-*.jar | head -1 | xargs basename)
          ICON_FLAG=""
          [ -f src/main/resources/zelus.png ] && ICON_FLAG="--icon src/main/resources/zelus.png"
          jpackage \
            --type deb \
            --name zelus-launcher \
            --app-version "$VERSION" \
            --vendor Zelus \
            --description "Zelus RSPS Launcher" \
            --input build/libs \
            --main-jar "$JAR_NAME" \
            --main-class com.zelus.launcher.ZelusLauncher \
            --dest build/dist \
            --java-options "-Xmx256m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --linux-shortcut \
            --linux-menu-group Games \
            $ICON_FLAG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: launcher/build/dist/*.deb

  # ── GitHub Release ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zelus Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/windows-zip/*.zip
            artifacts/macos-dmg/*.dmg
            artifacts/linux-deb/*.deb
          body: |
            ## Zelus Launcher ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `ZelusLauncher-*-windows.zip` — extract and run `ZelusLauncher.exe` |
            | macOS    | `ZelusLauncher-*-mac.dmg` — open and drag to Applications |
            | Linux    | `zelus-launcher_*.deb` — `sudo dpkg -i zelus-launcher_*.deb` |

            The launcher auto-updates the game client on every launch.
